# Push Wayland session env into the systemd --user instance and into the
# dbus activation environment, so xdg-desktop-portal-wlr / mpdris2-rs /
# notifier daemons launched by systemd user units see the same
# WAYLAND_DISPLAY, DISPLAY, XDG_CURRENT_DESKTOP, XDG_SESSION_TYPE as mango.
# Must run BEFORE anything that talks dbus (waybar, swaync, ...).
exec-once=systemctl --user import-environment WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XCURSOR_THEME XCURSOR_SIZE
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XCURSOR_THEME XCURSOR_SIZE

exec-once=waybar -c ~/.config/waybar/config-mango -s ~/.config/waybar/style-mango.css
# dunst.service: WantedBy cleared by a systemd drop-in (modules/home/mpd.nix),
# so it doesn't start with default.target before WAYLAND_DISPLAY is exported.
# `systemctl --user start` brings it up here, with the env already imported.
exec-once=systemctl --user start dunst.service
exec-once=brightnessctl -s set 65000
exec-once=swayidle -w
exec-once=awww-daemon 
exec-once=omnix-cmd-first-run
exec-once=~/.config/swayosd/launch.sh 
exec-once=omnix-powerevent-monitor
exec-once=omnix-battery-monitor-launcher 
exec-once=caffeine 
exec-once=wl-clip-persist --clipboard regular 
exec-once=wl-paste --type text --watch cliphist store  # Stores only text data
exec-once=wl-paste --type image --watch cliphist store  # Stores only image data
# mpd, mpdris2-rs, pipewire/wireplumber — поднимаются systemd user units
# (см. modules/home/mpd.nix и services.pipewire в modules/system/audio.nix),
# в exec-once здесь больше не нужны.
exec-once=omnix-bar-playerctl-loop
exec-once=crystal-dock
